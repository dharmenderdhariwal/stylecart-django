{% extends 'base.html' %}
{% block title %}Order Success | StyleCart{% endblock %}
{% block content %}
<section class="container section center-box">
    <h1>Order Placed Successfully</h1>
    <p>Your order ID is <strong>#{{ order.id }}</strong></p>

</section>
{% endblock %}
