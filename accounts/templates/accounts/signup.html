{% extends 'base.html' %}
{% block title %}Signup | StyleCart{% endblock %}
{% block content %}
<section class="container section auth-box">
    <form method="post" class="form-card small-form">
        <h1>Create Account</h1>
        {% csrf_token %}
        {% for field in form %}
            <div class="form-group">
                <label>{{ field.label }}</label>
                {{ field }}
                {% for error in field.errors %}<small class="error">{{ error }}</small>{% endfor %}
            </div>
        {% endfor %}
        <button class="btn" type="submit">Signup</button>
    </form>
</section>
{% endblock %}
